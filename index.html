<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lastminute - Haber Takip Panosu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Lastminute</h1>
        <p>Google News RSS ile TweetDeck tarzı çoklu haber takip uygulaması</p>
      </div>

      <label class="inline-control">
        <span>Aralık</span>
        <select id="intervalSelect">
          <option value="5">5 sn</option>
          <option value="15" selected>15 sn</option>
          <option value="30">30 sn</option>
          <option value="60">60 sn</option>
        </select>
      </label>

      <div class="topbar-actions">
        <button id="addTabBtn" class="btn primary">
          <span class="icon-wrap" data-icon="plus"></span>
          <span>Yeni Sekme</span>
        </button>
      </div>
    </header>

    <main>
      <section id="tabsGrid" class="tabs-grid" aria-live="polite"></section>
    </main>

    <dialog id="tabDialog" class="dialog">
      <form id="tabForm" method="dialog" class="dialog-content">
        <h2 id="tabDialogTitle">Yeni Sekme</h2>

        <label>
          Sekme başlığı
          <input required id="tabTitle" maxlength="40" placeholder="Örn: Finans" />
        </label>

        <label>
          Dil
          <select id="tabLanguage">
            <option value="tr">Türkçe</option>
            <option value="en">İngilizce</option>
          </select>
        </label>

        <label>
          Haber tazeliği
          <select id="tabFreshness">
            <option value="1h" selected>1 saat</option>
            <option value="3h">3 saat</option>
            <option value="5h">5 saat</option>
            <option value="10h">10 saat</option>
            <option value="1d">Bugün</option>
          </select>
        </label>

        <div class="actions">
          <button type="button" class="btn" id="cancelTabBtn">Vazgeç</button>
          <button type="submit" class="btn primary">Kaydet</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteConfirmDialog" class="dialog compact-dialog">
      <div class="dialog-content compact-content">
        <p id="deleteConfirmText">Silinsin mi?</p>
        <div class="actions compact-actions">
          <button type="button" class="btn" id="deleteNoBtn">No</button>
          <button type="button" class="btn primary" id="deleteCheckBtn">Check</button>
        </div>
      </div>
    </dialog>

    <template id="tabTemplate">
      <article class="tab-column">
        <header class="tab-header">
          <div class="tab-header-copy">
            <div class="tab-header-top">
              <div class="tab-title-shell">
                <span class="tab-signal"></span>
                <input class="tab-title-input" maxlength="80" />
              </div>
              <div class="tab-header-actions">
                <div class="tab-status"></div>
                <button class="icon-btn move-left-btn" type="button" title="Sola taşı">
                  <span class="icon-wrap" data-icon="arrow-left"></span>
                </button>
                <button class="icon-btn move-right-btn" type="button" title="Sağa taşı">
                  <span class="icon-wrap" data-icon="arrow-right"></span>
                </button>
                <button class="icon-btn danger delete-btn" type="button" title="Sil">
                  <span class="icon-wrap" data-icon="close"></span>
                </button>
              </div>
            </div>
            <div class="tab-meta-row">
              <span class="state-pill state-query"></span>
            </div>
            <div class="tab-control-row">
              <button class="control-btn lang-btn" type="button"></button>
              <div class="freshness-group">
                <button class="control-btn freshness-btn" type="button"></button>
                <div class="freshness-menu">
                  <button class="freshness-option" type="button" data-freshness="1h">Son 1 saat</button>
                  <button class="freshness-option" type="button" data-freshness="3h">Son 3 saat</button>
                  <button class="freshness-option" type="button" data-freshness="5h">Son 5 saat</button>
                  <button class="freshness-option" type="button" data-freshness="10h">Son 10 saat</button>
                  <button class="freshness-option" type="button" data-freshness="1d">Bugün</button>
                </div>
              </div>
              <button class="control-btn sort-btn" type="button"></button>
            </div>
          </div>
        </header>
        <ul class="news-list"></ul>
      </article>
    </template>

    <svg aria-hidden="true" class="icon-sprite" xmlns="http://www.w3.org/2000/svg">
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-arrow-left" viewBox="0 0 24 24">
        <path d="M14 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-arrow-right" viewBox="0 0 24 24">
        <path d="M10 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
    </svg>

    <script src="app.js"></script>
  </body>
</html>
